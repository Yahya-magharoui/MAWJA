version: "3.9"
services:
  db:
    image: postgres:16
    container_name: galini_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: galini
      POSTGRES_USER: galini
      POSTGRES_PASSWORD: galini
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
volumes:
  pgdata:
